---
# ONEX Node Contract - AST Extraction Compute Node
#
# Part of OMN-5657: AST-based code pattern extraction system
# Extracts structural code entities from Python source files using AST parsing.
contract_version:
  major: 1
  minor: 0
  patch: 0
node_version:
  major: 1
  minor: 0
  patch: 0
name: "node_ast_extraction_compute"
node_type: "COMPUTE_GENERIC"
description: >-
  Extracts structural code entities from Python source files using AST parsing. Detects classes, protocols,
  Pydantic models, functions, imports, and module-level constants, producing typed entity and relationship
  models for downstream knowledge-graph ingestion.
input_model:
  name: "AstExtractInput"
  module: "omniintelligence.nodes.node_ast_extraction_compute.handlers.handler_ast_extract"
  description: "Input containing source content, path, repo, file hash, and extraction config."
output_model:
  name: "ModelCodeEntitiesExtractedEvent"
  module: "omniintelligence.nodes.node_ast_extraction_compute.models"
  description: "Output containing extracted entities, relationships, and parse status."
operations:
  - name: "extract_entities"
    description: "Extract all entity types from a Python source file (main entry point)"
    input_fields:
      - source_content
      - source_path
      - source_repo
      - file_hash
      - crawl_id
      - config
    output_fields:
      - entities
      - relationships
      - parse_status
      - parse_error
configuration:
  extractors:
    - name: classes
      enabled: true
      extract_bases: true
      extract_methods: true
      extract_decorators: true
      extract_docstrings: true
    - name: protocols
      enabled: true
      extract_method_signatures: true
    - name: pydantic_models
      enabled: true
      extract_fields: true
      extract_validators: true
    - name: functions
      enabled: true
      extract_signatures: true
      extract_decorators: true
    - name: imports
      enabled: true
    - name: module_constants
      enabled: true
  relationships:
    - type: inherits
      enabled: true
      trust_tier: strong
    - type: imports
      enabled: true
      trust_tier: strong
    - type: defines
      enabled: true
      trust_tier: strong
    - type: implements
      enabled: true
      trust_tier: conservative
    - type: calls
      enabled: true
      trust_tier: weak
      inject_into_context: false
  deterministic_classification:
    enabled: true
    scoring_weights:
      domain: 0.30
      operation: 0.30
      keyword: 0.25
      feature: 0.15
    classifications:
      effect:
        keywords: [database, api, http, kafka, redis, file, send, publish, persist, fetch]
        domains: [database, api, messaging, storage, cache]
        operations: [create, read, update, delete, send, receive, publish, subscribe]
        features: [connection_pooling, retry_logic, circuit_breaker, rate_limiting]
      compute:
        keywords: [transform, convert, parse, format, encode, calculate, compute, hash, validate]
        domains: [ml, general]
        operations: [transform, calculate, compute, parse, validate, process]
        features: [validation, caching]
      reducer:
        keywords: [aggregate, reduce, collect, accumulate, group, summarize, merge, state, metrics]
        domains: [monitoring]
        operations: [aggregate, reduce, collect, group, summarize, accumulate]
        features: [metrics, logging]
      orchestrator:
        keywords: [orchestrate, coordinate, workflow, pipeline, dispatch, schedule, route]
        domains: [workflow]
        operations: [orchestrate, coordinate, schedule, dispatch, route]
        features: [parallel_execution, retry_orchestration, saga_pattern]
    min_confidence: 0.4
  quality_scoring:
    enabled: true
    weights:
      complexity: 0.20
      maintainability: 0.20
      documentation: 0.15
      temporal_relevance: 0.15
      pattern_compliance: 0.15
      architectural_compliance: 0.15
    complexity_thresholds:
      cyclomatic_low: 5
      cyclomatic_medium: 10
      cyclomatic_high: 15
      cognitive_low: 7
      cognitive_medium: 15
      max_lines_function: 50
      max_lines_class: 300
    code_smells:
      - pattern: "def\\s+\\w+\\([^)]{50,}\\):"
        name: long_parameter_list
        penalty: -0.6
      - pattern: "global\\s+\\w+"
        name: global_variable
        penalty: -0.8
      - pattern: "eval\\("
        name: eval_usage
        penalty: -0.9
      - pattern: "import\\s+\\*"
        name: wildcard_import
        penalty: -0.4
    good_patterns:
      - pattern: "def\\s+\\w+\\(.*?\\)\\s*->\\s*\\w+:"
        name: type_annotations
        bonus: 0.8
      - pattern: "class\\s+\\w+\\(.*Protocol.*\\):"
        name: protocol_interface
        bonus: 0.9
      - pattern: '""".*?"""'
        name: docstring_present
        bonus: 0.7
handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "extract_entities"
      handler:
        function: "handle_ast_extract"
        module: "omniintelligence.nodes.node_ast_extraction_compute.handlers.handler_ast_extract"
        type: "sync"
event_bus:
  event_bus_enabled: false
  subscribe_topics:
    - "onex.evt.omniintelligence.code-file-discovered.v1"
  publish_topics:
    - "onex.evt.omniintelligence.code-entities-extracted.v1"
dependencies: []
error_handling:
  error_types:
    - name: "AstExtractionSyntaxError"
      error_code: "AST_001"
      description: "Source file has a syntax error and cannot be parsed"
      recoverable: false
      retry_strategy: "none"
    - name: "AstExtractionComputeError"
      error_code: "AST_002"
      description: "Unexpected error during entity extraction"
      recoverable: true
      retry_strategy: "immediate_retry"
metadata:
  author: "OmniNode Team"
  created: "2026-03-21"
  updated: "2026-03-21"
  tags:
    - "ONEX"
    - "compute"
    - "ast-extraction"
    - "code-analysis"
    - "entity-extraction"
    - "knowledge-graph"
