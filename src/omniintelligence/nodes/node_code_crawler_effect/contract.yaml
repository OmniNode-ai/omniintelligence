---
name: "node_code_crawler_effect"
description: "Crawls configured repositories for Python source files and emits code-file-discovered events
  for downstream AST extraction."
contract_version: {major: 1, minor: 0, patch: 0}
node_version: {major: 1, minor: 0, patch: 0}
node_type: "EFFECT_GENERIC"

input_model:
  name: "ModelCrawlConfig"
  module: "omniintelligence.nodes.node_code_crawler_effect.models.model_crawl_config"

output_model:
  name: "ModelCodeFileDiscoveredEvent"
  module: "omniintelligence.nodes.node_ast_extraction_compute.models.model_code_file_discovered_event"

handler_routing:
  routing_strategy: "operation_match"
  handlers:
    - operation: "crawl_files"
      handler:
        function: "crawl_files"
        module: "omniintelligence.nodes.node_code_crawler_effect.handlers.handler_crawl_files"
        type: "sync"

event_bus:
  subscribe_topics:
    - "onex.cmd.omniintelligence.code-crawl-requested.v1"
  publish_topics:
    - "onex.evt.omniintelligence.code-file-discovered.v1"

config:
  query_engine:
    enabled: true
    indexes:
      - type: exact_path  # O(1) lookup by full path
      - type: extension  # O(1) lookup by file extension
      - type: directory  # O(1) lookup for directory children
      - type: name  # name-based similarity search
    performance_targets:
      lookup_ms: 5  # max lookup time
      index_rebuild_ms: 100  # max rebuild time for 10K files
      max_memory_mb: 20  # memory budget
  repos:
    - name: omniintelligence
      enabled: true
      path: ${OMNI_HOME}/omniintelligence
      include: ["src/**/*.py"]
      exclude: ["**/__pycache__/**", "**/node_tests/**"]
    - name: omniclaude
      enabled: true
      path: ${OMNI_HOME}/omniclaude
      include: ["src/**/*.py"]
      exclude: ["**/__pycache__/**"]
    - name: omnibase_core
      enabled: true
      path: ${OMNI_HOME}/omnibase_core
      include: ["src/**/*.py"]
      exclude: ["**/__pycache__/**"]
    - name: omnibase_infra
      enabled: true
      path: ${OMNI_HOME}/omnibase_infra
      include: ["src/**/*.py"]
      exclude: ["**/__pycache__/**"]
    - name: omnidash
      enabled: true
      path: ${OMNI_HOME}/omnidash
      include: ["server/**/*.ts", "server/**/*.js"]
      exclude: ["node_modules/**", "dist/**", "*.d.ts"]
